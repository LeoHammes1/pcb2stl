<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>pcb2stl — copper to STL or pen G-code</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app">
    <aside id="panel">
      <div class="brand">
        <h1>pcb2stl</h1>
        <p>Copper → STL or pen G-code</p>
      </div>

      <div class="card">
        <div class="eyebrow">Source</div>
        <label class="dropzone" id="drop">
          <input id="file" type="file" accept=".gbr,.ger,.gtl,.gbl,.gto,.gbo,.gko,.gm1,.art,.svg,.dxf" />
          <div id="dropLabel">⤓ Drop or click — Gerber / SVG / DXF</div>
          <div class="name hidden" id="fileName"></div>
        </label>
        <label class="dropzone bottom hidden" id="bottomRow">
          <input id="file2" type="file" accept=".gbr,.ger,.gtl,.gbl,.gto,.gbo,.gko,.gm1,.art,.svg,.dxf" />
          <div>⤓ Bottom layer — optional, adds double-sided</div>
          <div class="name hidden" id="file2Name"></div>
        </label>
        <div class="switch">
          <input id="mirror" type="checkbox" />
          <label for="mirror">Mirror (direct drawing)</label>
        </div>
      </div>

      <div class="card">
        <div class="eyebrow">Settings</div>

        <div class="field">
          <label for="format">Output</label>
          <select id="format" aria-label="Output format">
            <option value="stl">STL · for slicer</option>
            <option value="gcode">G-code · pen plotter (.gcode)</option>
          </select>
        </div>

        <div id="stlOpts">
          <div class="field">
            <label for="height">Layer height (mm)</label>
            <input id="height" type="number" value="0.2" min="0.01" step="0.01" />
          </div>
        </div>

        <div id="gcodeOpts" class="hidden">
          <div class="group-eyebrow">Pen</div>
          <div class="grid-2">
            <div class="field"><label for="penWidth">Pen width</label><input id="penWidth" type="number" value="0.4" min="0.05" step="0.05" /></div>
            <div class="field"><label for="perimeters">Perimeters</label><input id="perimeters" type="number" value="2" min="1" step="1" /></div>
          </div>
          <div class="switch" style="margin-top:10px"><input id="fill" type="checkbox" checked /><label for="fill">Fill copper areas</label></div>
          <details id="gcodeAdvanced">
            <summary>Advanced</summary>
            <div class="group-eyebrow">Motion</div>
            <div class="grid-2">
              <div class="field"><label for="drawZ">Draw Z</label><input id="drawZ" type="number" value="0" step="0.1" /></div>
              <div class="field"><label for="travelZ">Travel Z</label><input id="travelZ" type="number" value="2" step="0.1" /></div>
              <div class="field"><label for="drawFeed">Draw feed</label><input id="drawFeed" type="number" value="1200" min="1" step="100" /></div>
              <div class="field"><label for="travelFeed">Travel feed</label><input id="travelFeed" type="number" value="3000" min="1" step="100" /></div>
            </div>
            <div class="group-eyebrow">Pen lift</div>
            <div class="field">
              <label for="liftMode">Lift mode</label>
              <select id="liftMode">
                <option value="z">Z axis (pen mount)</option>
                <option value="servo">Servo (M280)</option>
              </select>
            </div>
            <div id="servoOpts" class="hidden">
              <div class="grid-3">
                <div class="field"><label for="servoUp">Up °</label><input id="servoUp" type="number" value="90" step="1" /></div>
                <div class="field"><label for="servoDown">Down °</label><input id="servoDown" type="number" value="40" step="1" /></div>
                <div class="field"><label for="servoDwell">Dwell ms</label><input id="servoDwell" type="number" value="300" min="0" step="50" /></div>
              </div>
            </div>
          </details>
        </div>
      </div>

      <div class="card hidden" id="placementCard">
        <div class="eyebrow">Placement</div>
        <div class="grid-3">
          <div class="field"><label for="boardMargin">Margin</label><input id="boardMargin" type="number" value="3" min="0" step="0.5" /></div>
          <div class="field"><label for="originX">Origin X</label><input id="originX" type="number" value="10" step="1" /></div>
          <div class="field"><label for="originY">Origin Y</label><input id="originY" type="number" value="10" step="1" /></div>
        </div>
        <div class="field"><label for="boardThickness">Board thickness (mm)</label><input id="boardThickness" type="number" value="1.6" min="0.1" step="0.1" /></div>
        <button class="btn btn-tertiary" id="jig" type="button">⤓ Download placement jig</button>
      </div>

      <div class="card action" id="exportBus">
        <div class="status" id="status"><span class="dot"></span><span id="statusText">Load a board — Gerber / SVG / DXF</span></div>
        <div class="dims" id="dims"></div>
        <button class="btn btn-primary" id="download" disabled>⤓ Download .stl</button>
      </div>
    </aside>

    <main id="viewer">
      <button class="fit-btn" id="fit">⤢ Fit</button>
      <div class="stats-chip hidden" id="statsChip">
        <div class="big" id="statStrokes">—</div>
        <div class="sub" id="statDist"></div>
      </div>
      <div class="legend hidden" id="legend">
        <div class="legend-row">
          <span class="legend-item"><span class="swatch" style="--c:#FBBF24"></span>perimeter</span>
          <span class="legend-item"><span class="swatch" style="--c:#B45309"></span>fill</span>
          <span class="legend-item"><span class="swatch dash" style="--c:#6A7180"></span>travel</span>
        </div>
        <div class="switch"><input id="hideTravel" type="checkbox" /><label for="hideTravel">hide travel</label></div>
      </div>
      <div class="origin-label hidden" id="originLabel"></div>
    </main>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
